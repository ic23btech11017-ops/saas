<!-- Topbar Component -->
<header class="topbar">
    <div class="topbar-left">
        <button class="mobile-toggle" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24">
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
        </button>
        <div class="topbar-search">
            <span class="search-icon"><svg viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg></span>
            <input type="text" placeholder="Search accounts, plans, invoices..." />
        </div>
    </div>

    <div class="topbar-right">
        <!-- Quick Actions dropdown -->
        <div class="quick-actions-dropdown" style="position:relative">
            <button class="topbar-icon-btn" title="Quick Actions"
                onclick="this.parentElement.querySelector('.qa-menu').classList.toggle('show')">
                <svg viewBox="0 0 24 24">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
            </button>
            <div class="qa-menu">
                <div class="qa-menu-header">Quick Actions</div>
                <a href="/billing/invoices-list.html" class="qa-menu-item">
                    <svg viewBox="0 0 24 24">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                    </svg>
                    Create Invoice
                </a>
                <a href="/subscriptions/subscriptions-list.html" class="qa-menu-item">
                    <svg viewBox="0 0 24 24">
                        <polyline points="23 4 23 10 17 10" />
                        <polyline points="1 20 1 14 7 14" />
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                    </svg>
                    Add Subscription
                </a>
                <a href="/accounts/index.html" class="qa-menu-item">
                    <svg viewBox="0 0 24 24">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                    New Account
                </a>
                <a href="/plans/plan-create.html" class="qa-menu-item">
                    <svg viewBox="0 0 24 24">
                        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2" />
                        <rect x="9" y="3" width="6" height="4" rx="1" />
                        <line x1="9" y1="12" x2="15" y2="12" />
                        <line x1="9" y1="16" x2="15" y2="16" />
                    </svg>
                    Create Plan
                </a>
                <div class="qa-menu-divider"></div>
                <a href="/reports/reports-dashboard.html" class="qa-menu-item">
                    <svg viewBox="0 0 24 24">
                        <line x1="18" y1="20" x2="18" y2="10" />
                        <line x1="12" y1="20" x2="12" y2="4" />
                        <line x1="6" y1="20" x2="6" y2="14" />
                    </svg>
                    View Reports
                </a>
            </div>
        </div>

        <!-- Dark mode toggle -->
        <button class="topbar-icon-btn theme-toggle" title="Toggle dark mode" onclick="toggleTheme()">
            <svg class="icon-moon" viewBox="0 0 24 24">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
            <svg class="icon-sun" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="5" />
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
        </button>

        <div class="notifications-wrapper" style="position:relative">
            <button class="topbar-icon-btn" title="Notifications"
                onclick="this.parentElement.querySelector('.notif-dropdown').classList.toggle('show')">
                <svg viewBox="0 0 24 24">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                    <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                </svg>
                <span class="notif-badge">3</span>
            </button>
            <div class="notif-dropdown">
                <div class="notif-header">
                    <h4>Notifications</h4>
                    <button class="btn btn-ghost btn-sm"
                        onclick="this.closest('.notif-dropdown').classList.remove('show'); showToast('All notifications marked as read', 'success')">Mark
                        all read</button>
                </div>
                <div class="notif-list">
                    <a href="#" class="notif-item unread">
                        <div class="notif-icon blue"><svg viewBox="0 0 24 24" width="16" height="16" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10" />
                                <line x1="12" y1="16" x2="12" y2="12" />
                                <line x1="12" y1="8" x2="12.01" y2="8" />
                            </svg></div>
                        <div class="notif-content">
                            <div class="notif-title">New account registered</div>
                            <div class="notif-time">2 minutes ago</div>
                        </div>
                    </a>
                    <a href="#" class="notif-item unread">
                        <div class="notif-icon amber"><svg viewBox="0 0 24 24" width="16" height="16" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <path
                                    d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                                <line x1="12" y1="9" x2="12" y2="13" />
                                <line x1="12" y1="17" x2="12.01" y2="17" />
                            </svg></div>
                        <div class="notif-content">
                            <div class="notif-title">High API usage detected</div>
                            <div class="notif-time">1 hour ago</div>
                        </div>
                    </a>
                    <a href="#" class="notif-item unread">
                        <div class="notif-icon green"><svg viewBox="0 0 24 24" width="16" height="16" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12" />
                            </svg></div>
                        <div class="notif-content">
                            <div class="notif-title">Invoice paid: INV-2026-081</div>
                            <div class="notif-time">3 hours ago</div>
                        </div>
                    </a>
                </div>
                <div class="notif-footer">
                    <a href="#">View all notifications</a>
                </div>
            </div>
        </div>
        <button class="topbar-icon-btn" title="Help" onclick="alert('Help center coming soon')">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" />
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                <line x1="12" y1="17" x2="12.01" y2="17" />
            </svg>
        </button>
        <div class="topbar-divider"></div>
        <div class="topbar-profile" onclick="this.querySelector('.profile-dropdown').classList.toggle('show')">
            <div class="topbar-avatar">JD</div>
            <div class="topbar-user-info">
                <span class="topbar-user-name">John Doe</span>
                <span class="topbar-user-role">Admin</span>
            </div>
            <span class="dropdown-arrow"><svg viewBox="0 0 24 24">
                    <polyline points="6 9 12 15 18 9" />
                </svg></span>

            <div class="profile-dropdown">
                <a href="/settings/settings.html">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    My Profile
                </a>
                <a href="/settings/settings.html">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                    Settings
                </a>
                <div class="dropdown-divider"></div>
                <a href="#" onclick="openModal('signOut'); return false;">
                    <svg viewBox="0 0 24 24">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    Sign Out
                </a>
            </div>
        </div>
    </div>
</header>

<script>
    /* ---- Dark Mode Toggle ---- */
    function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }
    /* Apply saved theme on load */
    (function () {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    })();

    /* ---- Close dropdowns on outside click ---- */
    document.addEventListener('click', function (e) {
        if (!e.target.closest('.quick-actions-dropdown')) {
            document.querySelectorAll('.qa-menu.show').forEach(m => m.classList.remove('show'));
        }
        if (!e.target.closest('.topbar-profile')) {
            document.querySelectorAll('.profile-dropdown.show').forEach(m => m.classList.remove('show'));
        }
        if (!e.target.closest('.notifications-wrapper')) {
            document.querySelectorAll('.notif-dropdown.show').forEach(m => m.classList.remove('show'));
        }
    });
</script>
